<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="External causal-edge validation G-F.2: do-operator causal 0.559 vs non-causal twin 0.569 vs null 0.500; causal recovers above null but not above the twin, so the edge is in-distribution not causal." font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<rect x="0" y="0" width="820" height="470" fill="#ffffff"/>
<text x="40" y="44" font-size="22" font-weight="700" fill="#12151a">External causal-edge validation (G-F.2) — recovery is correlational, not causal</text>
<text x="40" y="70" font-size="13.5" fill="#4a515b">Do-operator retrained with 10 CD4 TF regulators held OUT; zero-shot sign-recovery of 6,167 held-out external edges (Weinstock LLCB + Freimer KO-DE).</text>
<line x1="90" y1="340" x2="470" y2="340" stroke="#c9d0da"/>
<line x1="90" y1="245.0" x2="470" y2="245.0" stroke="#8a8f98" stroke-dasharray="4 3"/>
<text x="86" y="249.0" text-anchor="end" font-size="11.5" fill="#8a8f98">0.50 null</text>
<text x="86" y="154.0" text-anchor="end" font-size="11.5" fill="#8a8f98">0.60</text>
<text x="86" y="344" text-anchor="end" font-size="11.5" fill="#8a8f98">0.40</text>
<text x="255" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#12151a">Combined held-out edges — sign accuracy</text>
<rect x="140" y="245.2" width="74" height="94.8" rx="2" fill="#9aa1ab"/><text x="177" y="238.2" text-anchor="middle" font-size="13" fill="#9aa1ab">0.500</text><text x="177" y="358" text-anchor="middle" font-size="12.5" fill="#3b424c">null</text>
<rect x="230" y="188.9" width="74" height="151.1" rx="2" fill="#2e8b57"/><text x="267" y="181.9" text-anchor="middle" font-size="13" fill="#2e8b57" font-weight="700">0.559</text><text x="267" y="358" text-anchor="middle" font-size="12.5" fill="#3b424c">causal</text>
<rect x="320" y="179.5" width="74" height="160.5" rx="2" fill="#7e94c4"/><text x="357" y="172.5" text-anchor="middle" font-size="13" fill="#7e94c4">0.569</text><text x="357" y="358" text-anchor="middle" font-size="12.5" fill="#3b424c">twin</text>
<rect x="500" y="150" width="290" height="190" rx="8" fill="#faedd6" stroke="#e0c98f"/>
<text x="516" y="178" font-size="14" font-weight="700" fill="#9a6a15">IN-DISTRIBUTION, not causal</text>
<text x="516" y="204" font-size="12.5" fill="#5a4a1f">causal 0.559 &gt; null 0.500 (p=5×10⁻⁵)</text>
<text x="516" y="224" font-size="12.5" fill="#5a4a1f">but twin 0.569 ≥ causal</text>
<text x="516" y="248" font-size="13.5" font-weight="700" fill="#9a6a15">causal − twin = -0.010</text>
<text x="516" y="268" font-size="12" fill="#5a4a1f">regulator cluster-bootstrap</text>
<text x="516" y="285" font-size="12" fill="#5a4a1f">95% CI [−0.013, −0.005] (excludes 0)</text>
<text x="516" y="312" font-size="12" fill="#5a4a1f">The within-dataset C2 advantage does</text>
<text x="516" y="328" font-size="12" fill="#5a4a1f">NOT transfer to external causal edges.</text>
<text x="40" y="392" font-size="12.5" fill="#5a616b"><tspan font-weight="700">Freimer (DE), 6122 edges:</tspan> causal 0.560 vs twin 0.569 — real above-null signal, no causal edge.</text>
<text x="40" y="414" font-size="12.5" fill="#5a616b"><tspan font-weight="700">Weinstock (direct), 45 edges:</tspan> causal 0.400 (p=0.94) — at chance, underpowered (8 regulators); not over-read.</text>
<text x="40" y="450" font-size="11.5" fill="#8a8f98">results/fusion_gf2.csv · scripts/fusion_gf2.py + verify_gf2.py · axis window 0.40–0.60</text>
</svg>
