/* =========================================================================
   DESIGN TOKENS  (see DESIGN_SPEC.md §2 — warm neutrals + single teal accent)
   ========================================================================= */
:root {
  --bg:        #F7F4EF;
  --surface:   #FFFFFF;
  --surface-2: #F1ECE3;
  --ink:       #23201B;
  --ink-2:     #6B645A;
  --ink-3:     #9A9187;
  --line:      #E4DDD1;
  --accent:    #0E8C86;
  --accent-2:  #0B6E69;
  --accent-wash:#DCEEEC;
  --negative:  #9B2F3A;
  --negative-wash:#F1E0E1;
  --warn:      #B4763A;
  --warn-wash: #F3E7D6;
  --focus:     #1457C4;

  --radius:    12px;
  --radius-sm: 8px;
  --shadow-1:  0 1px 2px rgba(35,32,27,.06), 0 2px 8px rgba(35,32,27,.05);
  --shadow-2:  0 6px 24px rgba(35,32,27,.10);
  --ease:      cubic-bezier(0.16, 1, 0.3, 1);
  --dur:       260ms;

  --font-display: "Instrument Serif", Georgia, "Times New Roman", serif;
  --font-body: "Satoshi", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;

  --nav-w: 216px;
  --header-h: 60px;
  --control-h: 66px;
}

* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-variant-numeric: tabular-nums;
}
h1,h2,h3,h4 { margin: 0; font-weight: 400; }
.display { font-family: var(--font-display); font-weight: 400; letter-spacing: .2px; }
button, input, select { font-family: inherit; font-size: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; border-radius: 4px; }
::selection { background: var(--accent-wash); }

.visually-hidden {
  position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}

/* =========================================================================
   APP SHELL
   ========================================================================= */
.app {
  display: grid;
  grid-template-columns: var(--nav-w) 1fr;
  grid-template-rows: var(--header-h) 1fr var(--control-h);
  grid-template-areas: "header header" "nav main" "control control";
  height: 100vh;

/* range slider — teal themed (never OS default) */

.twobytwo { display: grid; grid-template-columns: auto 1fr 1fr; gap: 6px; }

/* misc utility */
.row { display: flex; align-items: center; gap: 10px; }
.wrap { flex-wrap: wrap; }

.stack { display: flex; flex-direction: column; gap: 14px; }

.stat-hero__num { font-family: var(--font-display); font-size: 60px; line-height: 1; color: var(--accent-2); }

.gate__tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px; }

>\n    <text x=\"40\" y=\"658\" fill=\"#12151a\" font-weight=\"600\">P7 · External causal-edge<\/text>\n    <text x=\"250\" y=\"658\" fill=\"#5a616b\">causal 0.559 &gt; null 0.500 but = twin 0.569 (Δ−0.010) · above null, not causal<\/text>\n    <rect x=\"852\" y=\"646\" width=\"108\" height=\"19\" rx=\"9.5\" fill=\"#faedd6\"/><text x=\"906\" y=\"659.5\" text-anchor=\"middle\" fill=\"#b6791f\" font-weight=\"700\">IN-DIST<\/text>\n    <line x1=\"40\" y1=\"676\" x2=\"960\" y2=\"676\" stroke=\"#e2e6ea\"/>\n    <text x=\"40\" y=\"700\" fill=\"#12151a\" font-weight=\"700\">C2 · Do-operator control<\/text>\n    <text x=\"250\" y=\"700\" fill=\"#2e8b57\" font-weight=\"600\">+0.118 condition / +0.162 gene vs the non-causal twin — the one positive<\/text>\n    <rect x=\"852\" y=\"688\" width=\"108\" height=\"19\" rx=\"9.5\" fill=\"#dcefe4\"/><text x=\"906\" y=\"701.5\" text-anchor=\"middle\" fill=\"#2e8b57\" font-weight=\"700\">POSITIVE<\/text>\n  <\/g>\n  <text x=\"40\" y=\"736\" font-size=\"13.5\" fill=\"#3b424c\">Under honest measurement the recoverable signal is far narrower than the genome-scale volume suggests: six probes sit at the floor, the one accuracy<\/text>\n  <text x=\"40\" y=\"753\" font-size=\"13.5\" fill=\"#3b424c\">positive (C2) is <tspan font-weight=\"700\">in-distribution, not causal<\/tspan>. The C2 anchor proves the nulls mean “no signal,” not “no sensitivity.”<\/text>\n<\/svg>\n","probes":[{"code":"P1","name":"causal-matrix (Â_C)","family":"mechanism","family_tags":["mechanistic"],"verdict":"FAIL","question":"Does an explicit per-context causal matrix beat a correlation null under P≪G?","key":"Â AUROC 0.62 vs correlation-null 0.83","detail":"mechanism recovery not established under P≪G (oracle true-col = 1.00).","consistent":true,"is_anchor":false,"source":"mechanism/results/c4_auroc.csv"},{"code":"P2","name":"fluctuation (3rd-moment C-NL)","family":"mechanism","family_tags":["mechanistic"],"verdict":"NEGATIVE","question":"Does the response 3rd moment p letal)"},{"symbol":"CSF2","annotation":"GM-CSF cytokine (chr5q31 cluster)"},{"symbol":"CXCL8","annotation":"chemokine (IL8)"},{"symbol":"IL2RA","annotation":"IL2 receptor alpha (activation marker)"},{"symbol":"S100A4","annotation":"calcium-binding"}]},"positive_control_argument":"The same degree/label-preserving null machinery that flags six probes as at-the-floor and one (P7) as in-distribution still registers the do-operator C2 as a clear positive. So a null cell means \"no recoverable signal here,\" not \"no sensitivity\" — which is what turns a pile of negatives into a calibrated predictability map rather than a blunt-instrument failure.","finding":"Under honest measurement — every probe scored against its own null and read relative to the measured reliability ceiling — the recoverable signal is far narrower than the raw genome-scale volume suggests. Six probes sit at the noise floor; the one accuracy positive (C2) is in-distribution, not causal (P7). Mapped seven ways, with zero GPU wasted.","summary":"A reliability-ceiling-calibrated, positive-control-anchored predictability audit of a Perturb-seq dataset — a diagnostic that tells you what is recoverable before you burn GPU. A methods/evaluation contribution on the axis the field asked for, reported conservatively as Tier-2 (n=1 case study; see the novelty note), not a claim to have solved perturbation prediction.","schmidt":{"dataset":"Schmidt et al. 2022 (Science; GEO GSE190604) — primary human T cells, 2 donors, CRISPRa Perturb-seq (73 screen-hit perturbations)","verdict":"audit machinery ports (qualified)","headline_unchanged":true,"ports":[{"code":"R1","label":"per-perturbation reproducibility (cross-well)","nostim":0.713,"stim":0.754,"vs_null":"null ≈ 0, p ≤ 1/501"},{"code":"R2","label":"reliability ceiling (split-half over cells, Spearman-Brown)","nostim":0.925,"stim":0.933,"vs_null":"—"},{"code":"R3","label":"relational-object S (target×target, cross-well split)","nostim":0.863,"stim":0.926,"vs_null":"     var ports = (s.ports || []).map(function (p) {
      return "<tr><td><b>" + esc(p.code) + "</b> " + esc(p.label) + "</td>" +
        "<td class='num'>" + App.fmt.num(p.nostim, ".3f") + "</td>" +
        "<td class='num'>" + App.fmt.num(p.stim, ".3f") + "</td>" +
        "<td class='muted'>" + esc(p.vs_null) + "</td></tr>";
    }).join("");
    var bounds = (s.bounds || []).map(function (b, i) {
      return "<li" + (i === 0 ? " class='bound-decisive'" : "") + ">" + esc(b) + "</li>";
    }).join("");
    card.innerHTML =
      "<div class='appendix__tag'>Appendix · second-dataset port</div>" +
      "<div class='card__title'>" + App.icon("layers") + "<span>Does the audit <em>machinery</em> port? — " + esc(s.dataset.split(" —")[0]) + "</span>" +
      "<span class='tag tag--good' style='margin-left:auto'>" + esc(s.verdict) + "</span></div>" +
      "<p class='card__sub'>" + esc(s.dataset) + ". The <b>headline finding is unchanged</b> — this asks only whether the identical audit machinery runs on a second dataset. Three model-free probes, recomputed on Schmidt's <em>own</em> floor (no do-operator retrain), each clearing Schmidt's own degree/label-preserving null:</p>" +
      "<table class='table'><thead><tr><th>Probe (Schmidt's own floor)</th><th class='num'>nostim</th><th class='num'>stim</th><th>vs Schmidt's null</th></tr></thead><tbody>" + ports + "</tbody></table>" +
      "<div class='data-note' style='margin-top:14px'>" + App.icon("check", 16) + "<div><b>Earned.</b> " + esc(s.earned) + "</div></div>" +
      "<div class='appendix__bounds'><div class='appendix__bounds-h'>" + App.icon("alert-triangle", 15) + " Four load-bearing bounds (verbatim)</div><ol>" + bounds + "</ol></div>" +
      "<div class='data-note data-note--qual' style='margin-top:12px'>" + App.icon("info", 16) + "<div><b>Not earned.</b> " + esc(s.not_earned) + " <b>Next step:</b> " + esc(s.next_step) + "</div></div>";
    return card;
  }

  function buildProbe(p) {
    var card = document.createElement("button");
    card.type = "button"; card.className = "gate" + (p.is_anchor ? " gate--anchor" : "");
    card.setAttribute("aria-expanded", "false");
    var vclass = VERDICT_CLASS[p.verdict] || "tag--axis";
    var tags = "<span class='tag " + vclass + "'>" + esc(p.verdict) + "</span>" +
      (p.family_tags || []).map(function (f) { return "<span class='tag tag--axis'>" + esc(f) + "</span>"; }).join("");
    card.innerHTML =
      "<div class='gate__top'><span class='gate__n" + (p.is_anchor ? " gate__n--pos" : "") + "'>" + esc(p.code) + "</span><span class='gate__name'>" + esc(p.name) + "</span></div>" +
      "<div class='gate__tags'>" + tags + "</div>" +
      "<div class='gate__key'>" + esc(p.key) + "</div>" +
      "<div class='gate__more' hidden><div class='gate__q'>" + esc(p.question) + "</div>" + esc(p.detail) +
      "<div class='gate__csv'>" + App.icon("info", 12) + " " + esc(p.source) + "</div></div>";
    var more = card.querySelector(".gate__more");
    card.addEventListener("click", function () {
      var open = more.hidden; more.hidden = !open;
      card.classList.toggle("is-open", open); card.setAttribute("aria-expanded", String(open));
    });
    return card;
  }

  function buildResidual() {
    var res = A.residual || {}; var card = h("div", "card"); card.style.marginTop = "18px";
    var chips = (res.top_genes || []).map(function (g) {
      return "<span class='gene-chip'><b>" + esc(g.symbol) + "</b> <span class='ann'>" + esc(g.annotation) + "</span></span>";
    }).join("");
    card.innerHTML =
      "<div class='card__title'>" + App.icon("dna") + "<span>What the floor <em>is</em></span></div>" +
      "<p class='card__sub'>The reproducible part of the residual localizes to the <b>" + esc(res.program) + "</b>, peaking at the <b>" + esc(res.peaks) + "</b> — a coherent biological program whose per-perturbation part is noise-limited at pseudobulk depth.</p>" +
      "<div class='gene-chips'>" + chips + "</div>";
    return card;
  }
})();

</script>
  <!-- boot -->
  <script>window.App && App.boot();</script>
</body>
</html>
