# Reproducible environment for the CD4+ perturbation causal+JEPA pipeline.
#   conda env create -f environment.yml && conda activate cd4-perturb
#
# Targets the L4 (Linux/CUDA) box. On a CUDA-less machine (e.g. Apple Silicon), drop the
# `pytorch-cuda` line and let pytorch resolve the CPU/MPS build — the CPU/Lane-C core,
# baselines (Ridge), and all tests run there; GPU jobs go through gpu_queue.py on the box.
name: cd4-perturb
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
dependencies:
  - python=3.12
  # --- Lane C core (CPU) ---
  - numpy=2.*
  - pandas=2.*
  - scipy=1.*
  - scikit-learn=1.*
  - pyarrow>=15
  - pyyaml>=6
  - tqdm>=4.66
  # --- single-cell ETL ---
  - anndata>=0.10
  - scanpy>=1.10
  - h5py>=3.10
  # --- figures (Developer 2) ---
  - matplotlib>=3.8
  - seaborn>=0.13
  # --- pipeline ---
  - snakemake-minimal>=8
  # --- GPU (comment out pytorch-cuda on a CUDA-less machine) ---
  - pytorch>=2.2
  - pytorch-cuda=12.1
  # --- context/network prior ---
  - networkx>=3.2
  - pip
  - pip:
      # ESM-2 protein language model (gene-token function prior, job G1)
      - fair-esm>=2.0.0
      # TabPFN v2/v3 tabular foundation model (baseline; NOT the v1 limits)
      - tabpfn>=2.0.0
      # node2vec regulatory-context prior over STRING/GRN
      - node2vec>=0.4.6
      # DEG helpers / gene-set enrichment (optional annotation figure)
      - gseapy>=1.1.0
