<svg viewBox="0 0 1000 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="External causal-edge validation G-F.2: causal 0.559 versus non-causal twin 0.569 versus null 0.500; recovers above null but not above the twin, in-distribution not causal." font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
<rect x="0" y="0" width="1000" height="470" fill="#ffffff"/>
<text x="40" y="42" font-size="20" font-weight="700" fill="#12151a">External causal-edge validation (G-F.2): correlational, not causal</text>
<text x="40" y="66" font-size="13.5" fill="#4a515b">Do-operator retrained with 10 CD4 TF regulators held OUT; zero-shot sign-recovery of 6,167 held-out external edges</text>
<text x="40" y="85" font-size="13.5" fill="#4a515b">(Weinstock LLCB + Freimer KO-DE).</text>
<line x1="100" y1="340" x2="470" y2="340" stroke="#c9d0da"/>
<line x1="100" y1="245.0" x2="470" y2="245.0" stroke="#8a8f98" stroke-dasharray="4 3"/>
<text x="96" y="249.0" text-anchor="end" font-size="11.5" fill="#8a8f98">0.50 null</text>
<text x="96" y="154.0" text-anchor="end" font-size="11.5" fill="#8a8f98">0.60</text>
<text x="96" y="344" text-anchor="end" font-size="11.5" fill="#8a8f98">0.40</text>
<text x="255" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#12151a">Combined held-out edges — sign accuracy</text>
<rect x="150" y="245.2" width="74" height="94.8" rx="2" fill="#9aa1ab"/><text x="187" y="237.2" text-anchor="middle" font-size="13" fill="#9aa1ab">0.500</text><text x="187" y="360" text-anchor="middle" font-size="12.5" fill="#3b424c">null</text>
<rect x="240" y="188.9" width="74" height="151.1" rx="2" fill="#2e8b57"/><text x="277" y="180.9" text-anchor="middle" font-size="13" fill="#2e8b57" font-weight="700">0.559</text><text x="277" y="360" text-anchor="middle" font-size="12.5" fill="#3b424c">causal</text>
<rect x="330" y="179.5" width="74" height="160.5" rx="2" fill="#7e94c4"/><text x="367" y="171.5" text-anchor="middle" font-size="13" fill="#7e94c4">0.569</text><text x="367" y="360" text-anchor="middle" font-size="12.5" fill="#3b424c">twin</text>
<rect x="600" y="150" width="360" height="192" rx="8" fill="#faedd6" stroke="#e0c98f"/>
<text x="620" y="180" font-size="15" font-weight="700" fill="#9a6a15">IN-DISTRIBUTION, not causal</text>
<text x="620" y="206" font-size="13" fill="#5a4a1f">causal 0.559 &gt; null 0.500 (p = 5×10⁻⁵),</text>
<text x="620" y="225" font-size="13" fill="#5a4a1f">but twin 0.569 ≥ causal.</text>
<text x="620" y="251" font-size="14" font-weight="700" fill="#9a6a15">causal − twin = -0.010</text>
<text x="620" y="270" font-size="12.5" fill="#5a4a1f">regulator cluster-bootstrap 95% CI</text>
<text x="620" y="287" font-size="12.5" fill="#5a4a1f">[−0.013, −0.005] — excludes 0.</text>
<text x="620" y="313" font-size="12.5" fill="#5a4a1f">The within-dataset C2 advantage does</text>
<text x="620" y="330" font-size="12.5" fill="#5a4a1f">NOT transfer to external causal edges.</text>
<text x="40" y="392" font-size="12.5" fill="#5a616b"><tspan font-weight="700">Freimer (DE), 6122 edges:</tspan> causal 0.560 vs twin 0.569 — real above-null signal, no causal edge.</text>
<text x="40" y="414" font-size="12.5" fill="#5a616b"><tspan font-weight="700">Weinstock (direct), 45 edges:</tspan> causal 0.400 (p = 0.94) — at chance, underpowered (8 regulators).</text>
<text x="40" y="450" font-size="11.5" fill="#8a8f98">results/fusion_gf2.csv · scripts/fusion_gf2.py + verify_gf2.py · sign-accuracy axis 0.40–0.60</text>
</svg>
